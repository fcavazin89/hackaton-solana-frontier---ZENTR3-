openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: FORGE3 Engenharia A2G Agents API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: agents
    description: FORGE3 A2G agent operations
  - name: conversations
    description: Conversation management
  - name: openai
    description: OpenAI streaming endpoints
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /agents:
    get:
      operationId: listAgents
      tags: [agents]
      summary: List all A2G agents
      responses:
        "200":
          description: List of agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"

  /agents/{agentId}:
    get:
      operationId: getAgent
      tags: [agents]
      summary: Get agent details
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"

  /conversations:
    get:
      operationId: listConversations
      tags: [conversations]
      summary: List conversations
      parameters:
        - name: agentId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConversationSummary"
    post:
      operationId: createConversation
      tags: [conversations]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationBody"
      responses:
        "201":
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationSummary"

  /conversations/{id}:
    get:
      operationId: getConversation
      tags: [conversations]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationDetail"
    delete:
      operationId: deleteConversation
      tags: [conversations]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /openai/conversations/{id}/messages:
    post:
      operationId: sendMessage
      tags: [openai]
      summary: Send message to agent (SSE streaming)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOpenaiMessageBody"
      responses:
        "200":
          description: Streamed response
          content:
            text/event-stream:
              schema:
                type: string

  /stats/overview:
    get:
      operationId: getStatsOverview
      tags: [agents]
      summary: Get usage stats overview
      responses:
        "200":
          description: Overview stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsOverview"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Agent:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        domain:
          type: string
          enum: [architecture, smart-contracts, infrastructure]
        systemPrompt:
          type: string
        icon:
          type: string
        totalConversations:
          type: integer
        totalMessages:
          type: integer
      required:
        - id
        - name
        - slug
        - description
        - domain
        - systemPrompt
        - icon
        - totalConversations
        - totalMessages

    ConversationSummary:
      type: object
      properties:
        id:
          type: string
        agentId:
          type: string
        agentName:
          type: string
        agentDomain:
          type: string
        title:
          type: string
        messageCount:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - agentId
        - agentName
        - agentDomain
        - title
        - messageCount
        - createdAt
        - updatedAt

    ConversationDetail:
      type: object
      properties:
        id:
          type: string
        agentId:
          type: string
        title:
          type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - agentId
        - title
        - messages
        - createdAt
        - updatedAt

    Message:
      type: object
      properties:
        id:
          type: string
        conversationId:
          type: string
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        createdAt:
          type: string
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt

    CreateConversationBody:
      type: object
      properties:
        agentId:
          type: string
        title:
          type: string
      required:
        - agentId

    SendOpenaiMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    StatsOverview:
      type: object
      properties:
        totalConversations:
          type: integer
        totalMessages:
          type: integer
        agentBreakdown:
          type: array
          items:
            type: object
            properties:
              agentId:
                type: string
              agentName:
                type: string
              domain:
                type: string
              conversationCount:
                type: integer
              messageCount:
                type: integer
            required:
              - agentId
              - agentName
              - domain
              - conversationCount
              - messageCount
      required:
        - totalConversations
        - totalMessages
        - agentBreakdown
