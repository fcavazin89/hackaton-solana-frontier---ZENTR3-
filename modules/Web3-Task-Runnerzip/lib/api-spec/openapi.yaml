openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: SCR3P Executor API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: tasks
  - name: deployments
  - name: integrations
  - name: dashboard
  - name: agent

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List all tasks
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, running, done, failed, awaiting_approval]
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a new task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskBody"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get a task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskBody"
      responses:
        "200":
          description: Task updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Task deleted

  /tasks/{id}/execute:
    post:
      operationId: executeTask
      tags: [tasks]
      summary: Manually execute a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task execution started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}/steps:
    get:
      operationId: listTaskSteps
      tags: [tasks]
      summary: Get steps for a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task steps
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskStep"

  /tasks/{id}/steps/{stepId}/approve:
    post:
      operationId: approveTaskStep
      tags: [tasks]
      summary: Approve a pending step (supervised mode)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: stepId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Step approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskStep"

  /tasks/{id}/steps/{stepId}/reject:
    post:
      operationId: rejectTaskStep
      tags: [tasks]
      summary: Reject a pending step
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: stepId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Step rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskStep"

  /deployments:
    get:
      operationId: listDeployments
      tags: [deployments]
      summary: List all deployments
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, deploying, success, failed]
      responses:
        "200":
          description: List of deployments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deployment"
    post:
      operationId: createDeployment
      tags: [deployments]
      summary: Create a new deployment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDeploymentBody"
      responses:
        "201":
          description: Deployment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deployment"

  /deployments/{id}:
    get:
      operationId: getDeployment
      tags: [deployments]
      summary: Get a deployment by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deployment found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deployment"
    patch:
      operationId: updateDeployment
      tags: [deployments]
      summary: Update deployment status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDeploymentBody"
      responses:
        "200":
          description: Deployment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deployment"
    delete:
      operationId: deleteDeployment
      tags: [deployments]
      summary: Delete a deployment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deployment deleted

  /integrations:
    get:
      operationId: listIntegrations
      tags: [integrations]
      summary: List all integrations
      responses:
        "200":
          description: List of integrations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Integration"
    post:
      operationId: createIntegration
      tags: [integrations]
      summary: Add a new integration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIntegrationBody"
      responses:
        "201":
          description: Integration added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Integration"

  /integrations/{id}:
    delete:
      operationId: deleteIntegration
      tags: [integrations]
      summary: Remove an integration
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Integration removed
    patch:
      operationId: updateIntegration
      tags: [integrations]
      summary: Toggle integration status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIntegrationBody"
      responses:
        "200":
          description: Integration updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Integration"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /agent/config:
    get:
      operationId: getAgentConfig
      tags: [agent]
      summary: Get agent configuration
      responses:
        "200":
          description: Agent config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentConfig"
    patch:
      operationId: updateAgentConfig
      tags: [agent]
      summary: Update agent configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentConfigBody"
      responses:
        "200":
          description: Updated config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentConfig"

  /agent/status:
    get:
      operationId: getAgentStatus
      tags: [agent]
      summary: Get agent runtime status
      responses:
        "200":
          description: Agent status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentStatus"

  /agent/trigger:
    post:
      operationId: triggerAgent
      tags: [agent]
      summary: Manually trigger an agent execution cycle
      responses:
        "200":
          description: Triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentStatus"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Task:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [smart_contract, frontend, backend, deploy, integration, audit, other]
        status:
          type: string
          enum: [pending, running, done, failed, awaiting_approval]
        priority:
          type: string
          enum: [low, medium, high, critical]
        output:
          type: string
          nullable: true
        currentStep:
          type: string
          nullable: true
        stepCount:
          type: integer
          nullable: true
        stepDone:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, title, category, status, priority, createdAt, updatedAt]

    CreateTaskBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [smart_contract, frontend, backend, deploy, integration, audit, other]
        priority:
          type: string
          enum: [low, medium, high, critical]
      required: [title, category, priority]

    UpdateTaskBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [pending, running, done, failed, awaiting_approval]
        priority:
          type: string
          enum: [low, medium, high, critical]
        output:
          type: string

    TaskStep:
      type: object
      properties:
        id:
          type: integer
        taskId:
          type: integer
        stepNumber:
          type: integer
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [pending, running, awaiting_approval, approved, rejected, done, failed, skipped]
        output:
          type: string
          nullable: true
        requiresApproval:
          type: boolean
        startedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, taskId, stepNumber, name, description, status, requiresApproval, createdAt]

    Deployment:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        network:
          type: string
        contractAddress:
          type: string
          nullable: true
        txHash:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, deploying, success, failed]
        gasUsed:
          type: string
          nullable: true
        deployedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, network, status, createdAt, updatedAt]

    CreateDeploymentBody:
      type: object
      properties:
        name:
          type: string
        network:
          type: string
        contractAddress:
          type: string
        txHash:
          type: string
      required: [name, network]

    UpdateDeploymentBody:
      type: object
      properties:
        status:
          type: string
          enum: [pending, deploying, success, failed]
        contractAddress:
          type: string
        txHash:
          type: string
        gasUsed:
          type: string
        deployedAt:
          type: string
          format: date-time

    Integration:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [rpc_provider, wallet, oracle, storage, indexer, bridge, dex, other]
        network:
          type: string
          nullable: true
        endpoint:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, inactive, error]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, type, status, createdAt, updatedAt]

    CreateIntegrationBody:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [rpc_provider, wallet, oracle, storage, indexer, bridge, dex, other]
        network:
          type: string
        endpoint:
          type: string
      required: [name, type]

    UpdateIntegrationBody:
      type: object
      properties:
        status:
          type: string
          enum: [active, inactive, error]
        endpoint:
          type: string

    DashboardSummary:
      type: object
      properties:
        totalTasks:
          type: integer
        runningTasks:
          type: integer
        doneTasks:
          type: integer
        failedTasks:
          type: integer
        awaitingApprovalTasks:
          type: integer
        totalDeployments:
          type: integer
        successDeployments:
          type: integer
        activeIntegrations:
          type: integer
        totalIntegrations:
          type: integer
        agentAutonomy:
          type: string
      required:
        - totalTasks
        - runningTasks
        - doneTasks
        - failedTasks
        - awaitingApprovalTasks
        - totalDeployments
        - successDeployments
        - activeIntegrations
        - totalIntegrations
        - agentAutonomy

    ActivityItem:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [task_created, task_executed, task_done, task_failed, task_awaiting, deployment_created, deployment_success, deployment_failed, integration_added, integration_removed, agent_cycle, step_approved, step_rejected]
        message:
          type: string
        entityId:
          type: integer
        entityType:
          type: string
          enum: [task, deployment, integration, agent]
        createdAt:
          type: string
          format: date-time
      required: [id, type, message, entityType, createdAt]

    AgentConfig:
      type: object
      properties:
        id:
          type: integer
        autonomyLevel:
          type: string
          enum: [manual, supervised, semi_auto, full_auto]
        maxConcurrentTasks:
          type: integer
        autoRetryFailed:
          type: boolean
        requireApprovalForDeploy:
          type: boolean
        requireApprovalForMainnet:
          type: boolean
        executionIntervalSec:
          type: integer
        isEnabled:
          type: boolean
        updatedAt:
          type: string
          format: date-time
      required: [id, autonomyLevel, maxConcurrentTasks, autoRetryFailed, requireApprovalForDeploy, requireApprovalForMainnet, executionIntervalSec, isEnabled, updatedAt]

    UpdateAgentConfigBody:
      type: object
      properties:
        autonomyLevel:
          type: string
          enum: [manual, supervised, semi_auto, full_auto]
        maxConcurrentTasks:
          type: integer
        autoRetryFailed:
          type: boolean
        requireApprovalForDeploy:
          type: boolean
        requireApprovalForMainnet:
          type: boolean
        executionIntervalSec:
          type: integer
        isEnabled:
          type: boolean

    WorkerAgent:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
        categories:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [idle, running, paused]
        currentTaskId:
          type: integer
          nullable: true
        currentTaskTitle:
          type: string
          nullable: true
        tasksCompleted:
          type: integer
        lastActiveAt:
          type: string
          format: date-time
          nullable: true
      required: [id, name, role, categories, status, tasksCompleted]

    AgentStatus:
      type: object
      properties:
        isRunning:
          type: boolean
        autonomyLevel:
          type: string
        lastCycleAt:
          type: string
          format: date-time
          nullable: true
        cycleCount:
          type: integer
        tasksProcessedTotal:
          type: integer
        pendingTaskCount:
          type: integer
        runningTaskCount:
          type: integer
        awaitingApprovalCount:
          type: integer
        nextCycleIn:
          type: integer
          nullable: true
        workers:
          type: array
          items:
            $ref: "#/components/schemas/WorkerAgent"
      required: [isRunning, autonomyLevel, cycleCount, tasksProcessedTotal, pendingTaskCount, runningTaskCount, awaitingApprovalCount, workers]
