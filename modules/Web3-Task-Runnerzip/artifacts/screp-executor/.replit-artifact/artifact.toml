kind = "web"
previewPath = "/"
title = "SCR3P Executor"
version = "1.0.0"
id = "artifacts/screp-executor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23256

[services.development]
run = "pnpm --filter @workspace/screp-executor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/screp-executor", "run", "build" ]
publicDir = "artifacts/screp-executor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23256"
BASE_PATH = "/"
