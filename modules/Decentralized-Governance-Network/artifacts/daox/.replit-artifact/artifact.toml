kind = "web"
previewPath = "/"
title = "DAOX — Governança Descentralizada"
version = "1.0.0"
id = "artifacts/daox"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26068

[services.development]
run = "pnpm --filter @workspace/daox run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/daox", "run", "build" ]
publicDir = "artifacts/daox/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26068"
BASE_PATH = "/"
