kind = "web"
previewPath = "/"
title = "CAPITAL3 — Web3 Funding Agent"
version = "1.0.0"
id = "artifacts/capital3"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22687

[services.development]
run = "pnpm --filter @workspace/capital3 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/capital3", "run", "build" ]
publicDir = "artifacts/capital3/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22687"
BASE_PATH = "/"
