openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Growth — 2AG Web3 AI Agents API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: Web3 startup projects
  - name: agents
    description: 2AG AI agents
  - name: tasks
    description: Agent tasks and actions
  - name: insights
    description: Growth insights generated by agents
  - name: dashboard
    description: Dashboard aggregates and summaries
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectBody"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /agents:
    get:
      operationId: listAgents
      tags: [agents]
      summary: List all agents
      responses:
        "200":
          description: List of agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"
    post:
      operationId: createAgent
      tags: [agents]
      summary: Create an agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentBody"
      responses:
        "201":
          description: Created agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"

  /agents/{id}:
    get:
      operationId: getAgent
      tags: [agents]
      summary: Get an agent by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateAgent
      tags: [agents]
      summary: Update an agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentBody"
      responses:
        "200":
          description: Updated agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
    delete:
      operationId: deleteAgent
      tags: [agents]
      summary: Delete an agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List all tasks
      parameters:
        - name: agentId
          in: query
          schema:
            type: integer
        - name: projectId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, in_progress, completed, failed]
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task for an agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskBody"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get a task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    put:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskBody"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /insights:
    get:
      operationId: listInsights
      tags: [insights]
      summary: List all insights
      parameters:
        - name: projectId
          in: query
          schema:
            type: integer
        - name: agentId
          in: query
          schema:
            type: integer
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of insights
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Insight"
    post:
      operationId: createInsight
      tags: [insights]
      summary: Create an insight
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInsightBody"
      responses:
        "201":
          description: Created insight
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Insight"

  /insights/{id}:
    delete:
      operationId: deleteInsight
      tags: [insights]
      summary: Delete an insight
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary — totals and active counts
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed across agents, tasks, and insights
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/agent-performance:
    get:
      operationId: getAgentPerformance
      tags: [dashboard]
      summary: Get per-agent task completion and insight counts
      responses:
        "200":
          description: Agent performance breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentPerformance"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    Project:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        chain:
          type: string
          description: e.g. Ethereum, Solana, Base, Polygon
        stage:
          type: string
          enum: [idea, mvp, launch, growth, scale]
        twitterHandle:
          type: string
        discordUrl:
          type: string
        websiteUrl:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, chain, stage, createdAt, updatedAt]

    CreateProjectBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        chain:
          type: string
        stage:
          type: string
          enum: [idea, mvp, launch, growth, scale]
        twitterHandle:
          type: string
        discordUrl:
          type: string
        websiteUrl:
          type: string
      required: [name, chain, stage]

    UpdateProjectBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        chain:
          type: string
        stage:
          type: string
          enum: [idea, mvp, launch, growth, scale]
        twitterHandle:
          type: string
        discordUrl:
          type: string
        websiteUrl:
          type: string

    Agent:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [community, tokenomics, marketing, traction, analytics, partnership]
        description:
          type: string
        status:
          type: string
          enum: [active, idle, paused]
        projectId:
          type: integer
        tasksCompleted:
          type: integer
        insightsGenerated:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, type, status, tasksCompleted, insightsGenerated, createdAt, updatedAt]

    CreateAgentBody:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [community, tokenomics, marketing, traction, analytics, partnership]
        description:
          type: string
        projectId:
          type: integer
      required: [name, type]

    UpdateAgentBody:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [community, tokenomics, marketing, traction, analytics, partnership]
        description:
          type: string
        status:
          type: string
          enum: [active, idle, paused]
        projectId:
          type: integer

    Task:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        agentId:
          type: integer
        projectId:
          type: integer
        status:
          type: string
          enum: [pending, in_progress, completed, failed]
        priority:
          type: string
          enum: [low, medium, high, critical]
        category:
          type: string
          enum: [community, tokenomics, marketing, traction, analytics, partnership]
        result:
          type: string
        dueDate:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, title, agentId, status, priority, category, createdAt, updatedAt]

    CreateTaskBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        agentId:
          type: integer
        projectId:
          type: integer
        priority:
          type: string
          enum: [low, medium, high, critical]
        category:
          type: string
          enum: [community, tokenomics, marketing, traction, analytics, partnership]
        dueDate:
          type: string
          format: date-time
      required: [title, agentId, priority, category]

    UpdateTaskBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [pending, in_progress, completed, failed]
        priority:
          type: string
          enum: [low, medium, high, critical]
        result:
          type: string
        completedAt:
          type: string
          format: date-time

    Insight:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        agentId:
          type: integer
        projectId:
          type: integer
        category:
          type: string
          enum: [community, tokenomics, marketing, traction, analytics, partnership]
        impact:
          type: string
          enum: [low, medium, high]
        createdAt:
          type: string
          format: date-time
      required: [id, title, content, agentId, category, impact, createdAt]

    CreateInsightBody:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        agentId:
          type: integer
        projectId:
          type: integer
        category:
          type: string
          enum: [community, tokenomics, marketing, traction, analytics, partnership]
        impact:
          type: string
          enum: [low, medium, high]
      required: [title, content, agentId, category, impact]

    DashboardSummary:
      type: object
      properties:
        totalProjects:
          type: integer
        totalAgents:
          type: integer
        activeAgents:
          type: integer
        totalTasks:
          type: integer
        completedTasks:
          type: integer
        pendingTasks:
          type: integer
        inProgressTasks:
          type: integer
        totalInsights:
          type: integer
        highImpactInsights:
          type: integer
      required:
        - totalProjects
        - totalAgents
        - activeAgents
        - totalTasks
        - completedTasks
        - pendingTasks
        - inProgressTasks
        - totalInsights
        - highImpactInsights

    ActivityItem:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [task_created, task_completed, insight_generated, agent_activated, project_created]
        title:
          type: string
        description:
          type: string
        agentName:
          type: string
        projectName:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, type, title, createdAt]

    AgentPerformance:
      type: object
      properties:
        agentId:
          type: integer
        agentName:
          type: string
        agentType:
          type: string
        tasksCompleted:
          type: integer
        tasksPending:
          type: integer
        insightsGenerated:
          type: integer
        status:
          type: string
      required: [agentId, agentName, agentType, tasksCompleted, tasksPending, insightsGenerated, status]
