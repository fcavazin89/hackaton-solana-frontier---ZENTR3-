kind = "web"
previewPath = "/"
title = "A2G STACK3"
version = "1.0.0"
id = "artifacts/a2g-stack3"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25823

[services.development]
run = "pnpm --filter @workspace/a2g-stack3 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/a2g-stack3", "run", "build" ]
publicDir = "artifacts/a2g-stack3/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25823"
BASE_PATH = "/"
